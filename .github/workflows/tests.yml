name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (CPU torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Unit tests (no model download)
        run: pytest tests/test_block_manager.py tests/test_scheduler.py tests/test_tensor_parallel.py -q

  # The full correctness suite (logits parity vs HuggingFace) downloads the
  # 1 GB Qwen2.5-0.5B checkpoint, so it runs only when manually requested.
  correctness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - run: pytest -q
